openapi: 3.1.1
info:
  title: PLM API
  version: 1.0.0
  description: |
    The Personal Lenders Manager backend API.

servers:
  - description: Local Server
    url: http://localhost:9094/

tags:
  - name: OTP
    description: OTP code generation and validation operations
  - name: Lenders
    description: Lender management operations
  - name: Transactions
    description: Transaction management operations

paths:
  /codes/generate:
    post:
      summary: Generate a 6-digit OTP code
      tags: [OTP]
      operationId: generateCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        '200':
          description: Code generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /codes/validate:
    post:
      summary: Validate an OTP code
      tags: [OTP]
      operationId: validateCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - email
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        '200':
          description: Valid code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '400':
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'

  /lenders:
    post:
      summary: Create a new lender
      tags: [Lenders]
      operationId: createLender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLenderRequest'
      responses:
        '200':
          description: Lender created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LenderResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Query lenders
      tags: [Lenders]
      operationId: queryLenders
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter by name (partial match)
        - name: phone
          in: query
          required: false
          schema:
            type: string
          description: Filter by phone number
      responses:
        '200':
          description: Lenders retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LenderResponse'

  /lenders/settle:
    post:
      summary: Settle a lender's debt
      tags: [Lenders]
      operationId: settleLender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleLenderRequest'
      responses:
        '200':
          description: Lender settled successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /lenders/{id}:
    put:
      summary: Update a lender
      tags: [Lenders]
      operationId: updateLender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLenderRequest'
      responses:
        '200':
          description: Lender updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LenderResponse'

    delete:
      summary: Delete a lender
      tags: [Lenders]
      operationId: deleteLender
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lender deleted successfully
        '400':
          description: Cannot delete lender with open transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get a lender by ID
      tags: [Lenders]
      operationId: getLenderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lender retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LenderResponse'
        '404':
          description: Lender not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /lenders/{lenderId}/history:
    get:
      summary: Query lender history
      tags: [Lenders]
      operationId: queryLenderHistory
      parameters:
        - name: lenderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: minValue
          in: query
          required: false
          schema:
            type: number
        - name: maxValue
          in: query
          required: false
          schema:
            type: number
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [PAID_IN_FULL, FORGIVEN]
      responses:
        '200':
          description: History retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryQueryResponse'
        '404':
          description: Lender not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /lenders/{lenderId}/transactions:
    post:
      summary: Create a new transaction or cancel an existing one
      tags: [Transactions]
      operationId: createTransaction
      parameters:
        - name: lenderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '200':
          description: Transaction created or cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

    get:
      summary: Query transactions
      tags: [Transactions]
      operationId: queryTransactions
      parameters:
        - name: lenderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: minValue
          in: query
          required: false
          schema:
            type: number
        - name: maxValue
          in: query
          required: false
          schema:
            type: number
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [BORROWED, PAYMENT, CANCELLED]
      responses:
        '200':
          description: Transactions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionQueryResponse'

components:
  schemas:
    GenerateResponse:
      type: object
      properties:
        code:
          type: string
          description: The generated 6-digit code
          example: "123456"
        email:
          type: string
          description: The email associated with the code
          example: "user@example.com"
    ValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the code is valid
        message:
          type: string
          description: Status message
          example: "Code valid"
    CreateLenderRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Lender name
          example: "John Doe"
        phone:
          type: string
          description: Lender phone number
          example: "+1234567890"
        bankData:
          type: string
          description: Bank account information
          example: "IBAN: XX12..."
        address:
          type: string
          description: Lender address
          example: "123 Main St"
    UpdateLenderRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        bankData:
          type: string
        address:
          type: string
    LenderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Lender unique identifier
        name:
          type: string
        phone:
          type: string
        bankData:
          type: string
        address:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTransactionRequest:
      type: object
      required:
        - idLender
      properties:
        idLender:
          type: string
          format: uuid
          description: Lender ID
        transactionValue:
          type: number
          description: Transaction value (required for BORROWED and PAYMENT)
        transactionType:
          type: string
          enum: [BORROWED, PAYMENT, CANCELLED]
        transactionPaymentType:
          type: string
          enum: [MONEY, WIRE_TRANSACTION, PHONE, OTHERS]
        cancelTransactionId:
          type: string
          format: uuid
          description: Transaction ID to cancel (when provided, creates a CANCELLED transaction)

    CancelTransactionRequest:
      type: object
      required:
        - transactionId
      properties:
        transactionId:
          type: string
          format: uuid
          description: Transaction ID to cancel (deprecated, use CreateTransactionRequest with cancelTransactionId)

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lenderId:
          type: string
          format: uuid
        transactionDate:
          type: string
          format: date-time
        transactionValue:
          type: number
        transactionType:
          type: string
          enum: [BORROWED, PAYMENT, CANCELLED]
        transactionPaymentType:
          type: string
          enum: [MONEY, WIRE_TRANSACTION, PHONE, OTHERS]
    TransactionQueryResponse:
      type: object
      properties:
        total:
          type: integer
        lender:
          type: string
        date:
          type: string
          format: date-time
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionItem'
    TransactionItem:
      type: object
      properties:
        date:
          type: string
          format: date-time
        value:
          type: number
        type:
          type: string
          enum: [BORROWED, PAYMENT, CANCELLED]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error description
    SettleLenderRequest:
      type: object
      required:
        - lenderId
        - settlementType
      properties:
        lenderId:
          type: string
          format: uuid
          description: Lender ID
        settlementType:
          type: string
          enum: [PAID_IN_FULL, FORGIVEN]
          description: Type of settlement
        paymentType:
          type: string
          enum: [MONEY, WIRE_TRANSACTION, PHONE, OTHERS]
          description: Payment type (required for PAID_IN_FULL)
    HistoryQueryResponse:
      type: object
      properties:
        lender:
          type: string
        date:
          type: string
          format: date-time
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'
    HistoryItem:
      type: object
      properties:
        date:
          type: string
          format: date
        value:
          type: number
        type:
          type: string
          enum: [PAID_IN_FULL, FORGIVEN]