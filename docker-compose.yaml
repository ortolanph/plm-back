services:
  plm_app:
    container_name: plm_backend
    build: .
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    environment:
      DATABASE_HOST: plm_database
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASS}
      DATABASE_PORT: 5432
    networks:
      - plm_network
    depends_on:
      - plm_database

  plm_database:
    image: postgres
    container_name: plm_database
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - ${DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - plm_network

networks:
  plm_network:
    driver: bridge
