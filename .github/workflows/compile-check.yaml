name: Compilation Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  compile:
    name: Compile Java 25
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile
        id: compile
        run: ./gradlew compileJava compileTestJava --no-daemon 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Report result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const succeeded = ${{ steps.compile.outcome == 'success' }};
            const output = fs.existsSync('build-output.txt')
              ? fs.readFileSync('build-output.txt', 'utf8').trim()
              : '_(no output captured)_';

            // Truncate to avoid hitting GitHub comment size limits
            const MAX_LEN = 6000;
            const truncated = output.length > MAX_LEN
              ? output.slice(0, MAX_LEN) + '\n\n…_(output truncated)_'
              : output;

            const icon   = succeeded ? '✅' : '❌';
            const title  = succeeded ? 'Compilation passed' : 'Compilation failed';
            const marker = '<!-- compile-check-bot -->';

            const body = `${marker}
            ## ${icon} ${title}

            <details>
            <summary>Build output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            > Java 25 · Gradle · triggered by commit \`${{ github.event.pull_request.head.sha }}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if compilation failed
        if: steps.compile.outcome == 'failure'
        run: exit 1